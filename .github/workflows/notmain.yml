name: build
on:
  push:
    branches:
      - '!main'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: setup bun
        uses: oven-sh/setup-bun@v2
      - name: Install packages
        run: bun install
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
