name: build
on:
  push:
    branches:
      - '!main'
    

permissions:
  contents: read
  pages: write
  id-token: write


jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: setup bun
        uses: oven-sh/setup-bun@v1
      - name: Install packages
        run: bun install
      - name: Build
        run: bun run build
